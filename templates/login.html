{% extends "base.html" %}

{% block title %}Log in · Aurora Gallery{% endblock %}

{% block content %}
  <section class="auth-card">
    <h1>Welcome back</h1>
    <p class="subtitle">Log in to manage your gallery.</p>
    <form method="post" class="form">
      <label for="username">Username</label>
      <input id="username" name="username" type="text" autocomplete="username" required />

      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required />

      <button type="submit" class="button full">Log in</button>
    </form>
    <p class="switch">New here? <a href="{{ url_for('register') }}">Create an account</a>.</p>
  </section>
{% endblock %}
